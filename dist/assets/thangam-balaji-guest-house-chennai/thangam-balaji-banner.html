<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thangam Balaji Guest House</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --gold-bright: #FFF176;
    --gold-deep: #E6A817;
    --blue-led: #00BFFF;
    --blue-glow: #0080FF;
    --white-led: #FFFFFF;
    --bg-night: #0A0E1A;
    --amber: #FF9500;
  }

  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }
  body {
    background: #050810;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100%;
    font-family: 'Raleway', sans-serif;
  }

  /* Stars background */
  .stars {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at top, #0d1b2a 0%, #050810 70%);
    overflow: hidden;
    z-index: 0;
  }
  .stars::before, .stars::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 75%, rgba(255,255,255,0.5) 0%, transparent 100%);
    animation: twinkle 4s infinite alternate;
  }
  .stars::after {
    background-image:
      radial-gradient(1px 1px at 25% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.5) 0%, transparent 100%);
    animation-delay: 2s;
  }
  @keyframes twinkle {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Main Banner */
  .banner {
    position: relative;
    width: 800px;
    height: 960px;
    z-index: 1;
    perspective: 1200px;
    transform-style: preserve-3d;
  }

  .banner-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform: rotateX(2deg) rotateY(-1deg);
    transform-style: preserve-3d;
    transition: transform 0.6s ease;
    animation: float3d 6s ease-in-out infinite;
  }
  @keyframes float3d {
    0%, 100% { transform: rotateX(2deg) rotateY(-1deg) translateY(0); }
    50% { transform: rotateX(1deg) rotateY(1deg) translateY(-8px); }
  }

  /* Background building image */
  .building-bg {
    position: absolute;
    inset: 0;
    background: url('hero-1.png') center/cover no-repeat;
    border-radius: 20px;
    overflow: hidden;
  }
  .building-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(5,8,16,0.65) 0%,
      rgba(5,8,16,0.2) 35%,
      rgba(5,8,16,0.1) 55%,
      rgba(5,8,16,0.7) 100%
    );
  }

  /* Outer glow border */
  .glow-border {
    position: absolute;
    inset: -3px;
    border-radius: 23px;
    background: linear-gradient(135deg, #FFD700, #00BFFF, #FF9500, #FFD700);
    background-size: 300% 300%;
    animation: borderShift 4s linear infinite;
    z-index: -1;
    filter: blur(4px);
    opacity: 0.9;
  }
  @keyframes borderShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* === TOP HEADLINE === */
  .top-headline {
    position: absolute;
    top: 32px;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
    padding: 0 20px;
  }

  .headline-badge {
    display: inline-block;
    padding: 6px 24px;
    background: rgba(255,215,0,0.12);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 30px;
    margin-bottom: 14px;
    animation: badgePulse 3s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%,100% { box-shadow: 0 0 8px rgba(255,215,0,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,215,0,0.7), 0 0 40px rgba(255,215,0,0.3); }
  }
  .badge-text {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .main-title {
    font-family: 'Cinzel', serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1.1;
    text-transform: uppercase;
    color: transparent;
    background: linear-gradient(180deg, #FFFFFF 0%, #FFD700 50%, #E6A817 100%);
    -webkit-background-clip: text;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.8)) drop-shadow(0 0 40px rgba(255,165,0,0.5));
    transform: translateZ(30px);
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    0% { filter: drop-shadow(0 0 15px rgba(255,215,0,0.6)) drop-shadow(0 0 30px rgba(255,165,0,0.4)); }
    100% { filter: drop-shadow(0 0 30px rgba(255,215,0,1)) drop-shadow(0 0 60px rgba(255,165,0,0.7)) drop-shadow(0 0 80px rgba(255,200,0,0.3)); }
  }

  .subtitle-line {
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* === LED DECORATIVE LINE === */
  .led-line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-bright), var(--gold), transparent);
    box-shadow: 0 0 8px var(--gold), 0 0 20px var(--gold-deep);
    animation: ledScan 3s ease-in-out infinite;
  }
  @keyframes ledScan {
    0%,100% { opacity: 0.8; box-shadow: 0 0 8px var(--gold), 0 0 20px var(--gold-deep); }
    50% { opacity: 1; box-shadow: 0 0 15px var(--gold), 0 0 35px var(--gold), 0 0 50px var(--gold-deep); }
  }
  .led-line-top { top: 185px; left: 40px; right: 40px; }
  .led-line-bottom { bottom: 155px; left: 40px; right: 40px; }

  /* === CENTER CONTENT === */
  .center-content {
    position: absolute;
    bottom: 170px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    gap: 0;
  }

  /* Hotel Name Card */
  .hotel-card {
    position: relative;
    padding: 28px 50px 24px;
    background: linear-gradient(135deg,
      rgba(0,0,0,0.85) 0%,
      rgba(15,20,40,0.9) 50%,
      rgba(0,0,0,0.85) 100%
    );
    border-radius: 16px;
    border: 1px solid rgba(255,215,0,0.25);
    transform: translateZ(50px);
    box-shadow:
      0 0 0 1px rgba(255,215,0,0.1),
      0 0 30px rgba(255,215,0,0.15),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.05);
    text-align: center;
    min-width: 500px;
    animation: cardFloat 5s ease-in-out infinite;
  }
  @keyframes cardFloat {
    0%,100% { transform: translateZ(50px) translateY(0); box-shadow: 0 0 30px rgba(255,215,0,0.15), 0 20px 60px rgba(0,0,0,0.6); }
    50% { transform: translateZ(50px) translateY(-4px); box-shadow: 0 0 40px rgba(255,215,0,0.25), 0 30px 70px rgba(0,0,0,0.5); }
  }

  /* Corner LED dots */
  .hotel-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 17px;
    background: linear-gradient(135deg, rgba(255,215,0,0.5) 0%, transparent 30%, transparent 70%, rgba(0,191,255,0.3) 100%);
    z-index: -1;
    opacity: 0;
    animation: cardBorderGlow 4s ease-in-out infinite;
  }
  @keyframes cardBorderGlow {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .hotel-icon {
    font-size: 32px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 10px rgba(255,215,0,0.8));
    animation: iconPulse 2s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%,100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255,215,0,0.8)); }
    50% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(255,215,0,1)); }
  }

  .hotel-name {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 3px;
    color: transparent;
    background: linear-gradient(180deg, #FFF9C4 0%, #FFD700 40%, #E6A817 100%);
    -webkit-background-clip: text;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 25px rgba(255,215,0,0.9)) drop-shadow(0 0 50px rgba(255,165,0,0.6));
    line-height: 1;
    animation: nameGlow 2.5s ease-in-out infinite alternate;
    display: block;
  }
  @keyframes nameGlow {
    0% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.7)) drop-shadow(0 0 40px rgba(255,165,0,0.4)); }
    100% { filter: drop-shadow(0 0 35px rgba(255,215,0,1)) drop-shadow(0 0 70px rgba(255,165,0,0.8)) drop-shadow(0 0 100px rgba(255,200,0,0.4)); }
  }

  .hotel-type {
    font-family: 'Raleway', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 12px;
    text-transform: uppercase;
    color: var(--blue-led);
    text-shadow: 0 0 10px var(--blue-led), 0 0 25px var(--blue-glow), 0 0 50px rgba(0,128,255,0.6);
    margin-top: 6px;
    animation: blueLed 3s ease-in-out infinite alternate;
  }
  @keyframes blueLed {
    0% { text-shadow: 0 0 8px var(--blue-led), 0 0 20px var(--blue-glow); }
    100% { text-shadow: 0 0 15px var(--blue-led), 0 0 35px var(--blue-glow), 0 0 60px rgba(0,191,255,0.5); }
  }

  /* Divider */
  .card-divider {
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
    margin: 16px auto;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  /* Info row */
  .info-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin-top: 4px;
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .info-icon {
    font-size: 14px;
    filter: drop-shadow(0 0 5px rgba(255,215,0,0.8));
  }
  .info-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
  }

  /* === PHONE CTA === */
  .phone-cta {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 36px;
    background: linear-gradient(135deg, rgba(0,191,255,0.15), rgba(0,128,255,0.1));
    border: 1px solid rgba(0,191,255,0.5);
    border-radius: 50px;
    cursor: pointer;
    animation: ctaPulse 2s ease-in-out infinite;
    transform: translateZ(20px);
  }
  @keyframes ctaPulse {
    0%,100% { box-shadow: 0 0 15px rgba(0,191,255,0.3), 0 0 30px rgba(0,128,255,0.2); border-color: rgba(0,191,255,0.5); }
    50% { box-shadow: 0 0 25px rgba(0,191,255,0.6), 0 0 50px rgba(0,128,255,0.4); border-color: rgba(0,191,255,0.9); }
  }
  .phone-icon {
    font-size: 20px;
    filter: drop-shadow(0 0 8px var(--blue-led));
    animation: phoneRing 3s ease-in-out infinite;
  }
  @keyframes phoneRing {
    0%,80%,100% { transform: rotate(0); }
    85% { transform: rotate(-15deg); }
    90% { transform: rotate(15deg); }
    95% { transform: rotate(-10deg); }
  }
  .phone-number {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--blue-led);
    text-shadow: 0 0 15px var(--blue-led), 0 0 30px var(--blue-glow);
    letter-spacing: 2px;
  }
  .phone-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* === BOTTOM ADDRESS === */
  .address-bar {
    position: absolute;
    bottom: 30px;
    left: 40px; right: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 50px;
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  .address-text {
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
  }
  .address-icon {
    font-size: 12px;
    filter: drop-shadow(0 0 5px var(--amber));
    color: var(--amber);
  }

  /* === ROOMS SIGN (side) === */
  .rooms-sign {
    position: absolute;
    left: -10px;
    top: 50%;
    transform: translateY(-50%) translateZ(60px);
    background: linear-gradient(180deg, #1565C0 0%, #0D47A1 100%);
    border-radius: 10px;
    padding: 20px 14px;
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow:
      0 0 20px rgba(0,100,255,0.6),
      0 0 50px rgba(0,80,255,0.4),
      0 0 80px rgba(0,60,255,0.2),
      inset 0 0 20px rgba(255,255,255,0.05);
    animation: roomSign 3s ease-in-out infinite;
    z-index: 11;
  }
  @keyframes roomSign {
    0%,100% { box-shadow: 0 0 20px rgba(0,100,255,0.6), 0 0 50px rgba(0,80,255,0.4); }
    50% { box-shadow: 0 0 35px rgba(0,150,255,0.9), 0 0 70px rgba(0,120,255,0.6), 0 0 100px rgba(0,80,255,0.3); }
  }
  .rooms-letters {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .rooms-letter {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px rgba(100,180,255,0.8);
    display: block;
    line-height: 1;
  }
  .rooms-available {
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.9);
    margin-top: 6px;
    text-align: center;
    text-transform: uppercase;
  }

  /* === FLOATING LED PARTICLES === */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 20px;
    z-index: 5;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: particleDrift linear infinite;
  }
  @keyframes particleDrift {
    0% { opacity: 0; transform: translateY(100%) scale(0); }
    10% { opacity: 1; }
    90% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1); }
  }

  /* === CORNER ACCENTS === */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    z-index: 8;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold), 0 0 15px var(--gold-deep);
    animation: cornerGlow 2s ease-in-out infinite alternate;
  }
  @keyframes cornerGlow {
    0% { box-shadow: 0 0 6px var(--gold); opacity: 0.8; }
    100% { box-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold-deep); opacity: 1; }
  }
  .corner::before { height: 2px; width: 100%; top: 0; left: 0; }
  .corner::after { width: 2px; height: 100%; top: 0; left: 0; }

  .corner-tl { top: 20px; left: 20px; }
  .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

  /* Star ratings */
  .stars-rating {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 8px;
    filter: drop-shadow(0 0 6px rgba(255,215,0,0.8));
  }
  .star {
    font-size: 14px;
    color: var(--gold);
    animation: starTwinkle 1s ease-in-out infinite alternate;
  }
  .star:nth-child(2) { animation-delay: 0.2s; }
  .star:nth-child(3) { animation-delay: 0.4s; }
  .star:nth-child(4) { animation-delay: 0.6s; }
  .star:nth-child(5) { animation-delay: 0.8s; }
  @keyframes starTwinkle {
    0% { opacity: 0.7; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  /* Scan line effect */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), rgba(0,191,255,0.5), rgba(255,215,0,0.3), transparent);
    z-index: 9;
    animation: scanMove 8s linear infinite;
    pointer-events: none;
  }
  @keyframes scanMove {
    0% { top: -10px; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { top: calc(100% + 10px); opacity: 0; }
  }

  /* Scale to fit when embedded in iframe (hero section) */
  .banner-wrapper {
    transform: scale(var(--scale, 1));
    transform-origin: center center;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100%;
    width: 100%;
  }

</style>
</head>
<body>
<div class="banner-wrapper">
<div class="stars"></div>

<div class="banner">
  <div class="glow-border"></div>
  <div class="banner-inner">

    <!-- Building background -->
    <div class="building-bg"></div>

    <!-- Scan line -->
    <div class="scan-line"></div>

    <!-- Corners -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- LED lines -->
    <div class="led-line led-line-top"></div>
    <div class="led-line led-line-bottom"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- ROOMS side sign -->
    <div class="rooms-sign">
      <div class="rooms-letters">
        <span class="rooms-letter">R</span>
        <span class="rooms-letter">O</span>
        <span class="rooms-letter">O</span>
        <span class="rooms-letter">M</span>
        <span class="rooms-letter">S</span>
      </div>
      <div class="rooms-available">AVAILABLE</div>
    </div>

    <!-- Top headline -->
    <div class="top-headline">
      <div class="headline-badge">
        <span class="badge-text">✦ Premium Stay Experience ✦</span>
      </div>
      <div class="main-title">YOUR COMFORTABLE<br>HOME AWAY FROM HOME</div>
      <div class="subtitle-line">Teynampet · Chennai</div>
    </div>

    <!-- Center hotel card -->
    <div class="center-content">
      <div class="hotel-card">
        <div class="hotel-icon">🏨</div>
        <span class="hotel-name">THANGAM BALAJI</span>
        <div class="hotel-type">GUEST HOUSE</div>
        <div class="stars-rating">
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
        </div>
        <div class="card-divider"></div>
        <div class="info-row">
          <div class="info-item">
            <span class="info-icon">🌙</span>
            <span class="info-text">24/7 Service</span>
          </div>
          <div class="info-item">
            <span class="info-icon">❄️</span>
            <span class="info-text">AC Rooms</span>
          </div>
          <div class="info-item">
            <span class="info-icon">📶</span>
            <span class="info-text">Free WiFi</span>
          </div>
        </div>
      </div>

      <div class="phone-cta">
        <span class="phone-icon">📞</span>
        <div>
          <div class="phone-label">Call us now</div>
          <div class="phone-number">24312387</div>
        </div>
      </div>
    </div>

    <!-- Address bar -->
    <div class="address-bar">
      <span class="address-icon">📍</span>
      <span class="address-text">No. 4/7 (26/1), Anna Salai, Teynampet, Chennai - 18</span>
      <span class="address-icon">🏠</span>
    </div>

  </div>
</div>
</div>

<script>
// Scale banner to fit iframe viewport (800x960 design)
(function(){
  function setScale() {
    var s = Math.min(window.innerWidth / 800, window.innerHeight / 960);
    document.documentElement.style.setProperty('--scale', s);
  }
  setScale();
  window.addEventListener('resize', setScale);
})();
// Create floating LED particles
const container = document.getElementById('particles');
const colors = ['#FFD700','#00BFFF','#FF9500','#FFF176','#80DFFF'];

for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 1;
  const color = colors[Math.floor(Math.random() * colors.length)];
  p.style.cssText = `
    width: ${size}px;
    height: ${size}px;
    left: ${Math.random() * 100}%;
    bottom: 0;
    background: ${color};
    box-shadow: 0 0 ${size*3}px ${color};
    animation-duration: ${Math.random() * 8 + 6}s;
    animation-delay: ${Math.random() * 8}s;
  `;
  container.appendChild(p);
}

// Subtle 3D mouse parallax
const banner = document.querySelector('.banner-inner');
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const rx = ((e.clientY - cy) / cy) * -3;
  const ry = ((e.clientX - cx) / cx) * 3;
  banner.style.transform = `rotateX(${rx + 2}deg) rotateY(${ry - 1}deg)`;
});
document.addEventListener('mouseleave', () => {
  banner.style.transform = '';
});
</script>
</body>
